<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Fashion Intel — Global Trends Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #0a0a0a;
    --paper: #f5f0e8;
    --cream: #ede8dc;
    --accent: #c8a96e;
    --muted: #8a8278;
    --guardian: #0a3d2e;
    --nyt: #1a1a1a;
    --vogue: #8b0000;
    --rule: rgba(10,10,10,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  .masthead {
    border-bottom: 3px double var(--ink);
    padding: 0 40px;
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .masthead-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 0 6px;
    border-bottom: 1px solid var(--rule);
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .masthead-title { text-align: center; padding: 14px 0 10px; }

  .masthead-title h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .masthead-title h1 span { color: var(--accent); font-style: italic; }

  .masthead-subtitle {
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  .nav-tabs {
    display: flex;
    justify-content: center;
    border-top: 1px solid var(--rule);
  }

  .nav-tab {
    padding: 10px 22px;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    cursor: pointer;
    border: none;
    background: none;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .nav-tab:hover { color: var(--ink); }
  .nav-tab.active { color: var(--ink); border-bottom-color: var(--accent); font-weight: 500; }

  .ticker {
    background: var(--ink);
    color: var(--paper);
    padding: 7px 0;
    overflow: hidden;
    white-space: nowrap;
  }

  .ticker-inner {
    display: inline-block;
    animation: ticker 60s linear infinite;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  @keyframes ticker {
    0% { transform: translateX(100vw); }
    100% { transform: translateX(-100%); }
  }

  .page { max-width: 1200px; margin: 0 auto; padding: 40px 40px 80px; }

  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  .stat { background: var(--paper); padding: 20px 28px; text-align: center; }

  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
    animation: fadeUp 0.6s ease both;
  }

  .source-badge {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 5px 12px;
    border: 1px solid currentColor;
    font-weight: 500;
  }

  .source-badge.guardian { color: var(--guardian); }
  .source-badge.nyt { color: var(--nyt); }
  .source-badge.vogue { color: var(--vogue); }

  .section-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; }
  .section-count { margin-left: auto; font-size: 12px; color: var(--muted); }

  .articles-section { margin-bottom: 56px; }

  .articles-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1px;
    background: var(--rule);
    border: 1px solid var(--rule);
  }

  .article-card {
    background: var(--paper);
    padding: 24px 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: background 0.2s ease;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
  }

  .article-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.2s ease;
    transform-origin: bottom;
  }

  .article-card:hover { background: var(--cream); }
  .article-card:hover::before { transform: scaleY(1); }

  .article-number {
    font-family: 'Playfair Display', serif;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.1em;
    font-style: italic;
  }

  .article-title {
    font-family: 'Playfair Display', serif;
    font-size: 16px;
    font-weight: 700;
    line-height: 1.45;
  }

  .article-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: auto;
    padding-top: 8px;
    border-top: 1px solid var(--rule);
  }

  .article-source { font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
  .article-arrow { font-size: 14px; color: var(--accent); transition: transform 0.2s ease; }
  .article-card:hover .article-arrow { transform: translateX(4px); }

  .city-section { margin-bottom: 64px; animation: fadeUp 0.6s ease both; }

  .city-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 24px;
    padding-bottom: 12px;
    border-bottom: 2px solid var(--ink);
  }

  .city-flag { font-size: 24px; }
  .city-name { font-family: 'Playfair Display', serif; font-size: 32px; font-weight: 900; letter-spacing: -0.02em; }
  .city-subtitle { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-left: auto; }

  .city-images {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .trend-image-card {
    position: relative;
    overflow: hidden;
    aspect-ratio: 3/4;
    background: var(--cream);
    cursor: pointer;
    text-decoration: none;
    display: block;
  }

  .trend-image-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.4s ease;
    display: block;
  }

  .trend-image-card:hover img { transform: scale(1.05); }

  .trend-image-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    padding: 12px;
    background: linear-gradient(transparent, rgba(0,0,0,0.7));
    color: white;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .trend-image-card:hover .trend-image-overlay { opacity: 1; }

  .image-placeholder {
    width: 100%;
    aspect-ratio: 3/4;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--cream);
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 48px 0;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--rule); }

  .footer {
    border-top: 3px double var(--ink);
    padding: 24px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .loading { text-align: center; padding: 80px 20px; }

  .loading-spinner {
    width: 40px; height: 40px;
    border: 2px solid var(--rule);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 20px;
  }

  .loading p { font-family: 'Playfair Display', serif; font-style: italic; color: var(--muted); font-size: 15px; }

  .error-box {
    border: 1px solid #c0392b;
    background: #fdf5f4;
    padding: 24px 28px;
    margin: 40px 0;
    font-size: 14px;
    color: #c0392b;
    line-height: 1.8;
  }

  .error-box strong { display: block; font-family: 'Playfair Display', serif; font-size: 17px; margin-bottom: 8px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .masthead, .page, .footer { padding-left: 20px; padding-right: 20px; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .city-images { grid-template-columns: repeat(2, 1fr); }
    .articles-grid { grid-template-columns: 1fr; }
    .nav-tab { padding: 10px 12px; font-size: 10px; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="masthead-top">
    <span id="live-date">Loading...</span>
    <span>Global Fashion Intelligence</span>
    <span>Est. 2026</span>
  </div>
  <div class="masthead-title">
    <h1>Fashion <span>Intel</span></h1>
    <div class="masthead-subtitle">Daily Digest — Guardian · NYT · Vogue</div>
  </div>
  <nav class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('trends', this)">🌍 Global Trends</button>
    <button class="nav-tab" onclick="showTab('guardian', this)">📰 Guardian</button>
    <button class="nav-tab" onclick="showTab('nyt', this)">📰 NYT</button>
    <button class="nav-tab" onclick="showTab('vogue', this)">👗 Vogue</button>
    <button class="nav-tab" onclick="showTab('all', this)">📋 All Articles</button>
  </nav>
</header>

<div class="ticker">
  <div class="ticker-inner" id="ticker-text">Loading headlines...</div>
</div>

<main class="page" id="main-content">
  <div class="loading">
    <div class="loading-spinner"></div>
    <p>Fetching today's fashion intelligence...</p>
  </div>
</main>

<footer class="footer">
  <span>Fashion Intel System © 2026</span>
  <span id="footer-count">—</span>
  <span>Auto-refreshes daily at 08:00</span>
</footer>

<script>
const CSV_URL    = 'http://127.0.0.1:8000/data/articles.csv';
const IMAGES_URL = 'http://127.0.0.1:8000/data/trend_images.json';

const now = new Date();
document.getElementById('live-date').textContent =
  now.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

function showTab(name, btn) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('tab-' + name);
  if (el) el.classList.add('active');
  if (btn) btn.classList.add('active');
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.replace(/"/g,'').trim());
  return lines.slice(1).map(line => {
    const cols = [];
    let current = '', inQuotes = false;
    for (let ch of line) {
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { cols.push(current.trim()); current = ''; }
      else { current += ch; }
    }
    cols.push(current.trim());
    const obj = {};
    headers.forEach((h, i) => obj[h] = (cols[i] || '').replace(/^"|"$/g,''));
    return obj;
  }).filter(r => r.title && r.link);
}

function renderCards(articles) {
  return articles.map((a, i) => `
    <a class="article-card" href="${a.link}" target="_blank" rel="noopener">
      <div class="article-number">No. ${String(i+1).padStart(2,'0')}</div>
      <div class="article-title">${a.title}</div>
      <div class="article-meta">
        <span class="article-source">${a.scraped_at || 'Today'}</span>
        <span class="article-arrow">→</span>
      </div>
    </a>`).join('');
}

function renderCityImages(images, cityName) {
  const imgs = images.filter(img => img.city === cityName);
  if (!imgs.length) return Array(4).fill(`<div class="image-placeholder">No images</div>`).join('');
  return imgs.map(img => `
    <a class="trend-image-card" href="${img.unsplash_link}" target="_blank" rel="noopener">
      <img src="${img.thumb_url}" alt="${img.description}" loading="lazy"/>
      <div class="trend-image-overlay">📷 ${img.photographer}</div>
    </a>`).join('');
}

const cities = [
  { name: 'Paris',    flag: '🇫🇷', subtitle: 'Haute Couture & Luxury' },
  { name: 'Milan',    flag: '🇮🇹', subtitle: 'Craftsmanship & Elegance' },
  { name: 'New York', flag: '🇺🇸', subtitle: 'Street Style & Ready-to-Wear' },
  { name: 'Global',   flag: '🌍',  subtitle: 'International Trends' },
];

function renderDashboard(articles, images) {
  const guardian = articles.filter(a => a.source === 'The Guardian');
  const nyt      = articles.filter(a => a.source === 'NYT Fashion');
  const vogue    = articles.filter(a => a.source === 'Vogue');

  document.getElementById('main-content').innerHTML = `
    <div class="stats-bar">
      <div class="stat"><div class="stat-number">${articles.length}</div><div class="stat-label">Total Articles</div></div>
      <div class="stat"><div class="stat-number">${guardian.length}</div><div class="stat-label">The Guardian</div></div>
      <div class="stat"><div class="stat-number">${nyt.length}</div><div class="stat-label">NYT Fashion</div></div>
      <div class="stat"><div class="stat-number">${vogue.length}</div><div class="stat-label">Vogue</div></div>
    </div>

    <div id="tab-trends" class="tab-content active">
      <div class="divider">✦ &nbsp; Global Fashion Capitals &nbsp; ✦</div>
      ${cities.map((city, ci) => `
        ${ci > 0 ? '<div class="divider">✦</div>' : ''}
        <div class="city-section">
          <div class="city-header">
            <span class="city-flag">${city.flag}</span>
            <h2 class="city-name">${city.name}</h2>
            <span class="city-subtitle">${city.subtitle}</span>
          </div>
          <div class="city-images">${renderCityImages(images, city.name)}</div>
        </div>`).join('')}
    </div>

    <div id="tab-guardian" class="tab-content">
      <div class="section-header">
        <span class="source-badge guardian">The Guardian</span>
        <h2 class="section-title">Fashion & Style</h2>
        <span class="section-count">${guardian.length} articles</span>
      </div>
      <div class="articles-grid">${renderCards(guardian)}</div>
    </div>

    <div id="tab-nyt" class="tab-content">
      <div class="section-header">
        <span class="source-badge nyt">NYT Fashion</span>
        <h2 class="section-title">Style Section</h2>
        <span class="section-count">${nyt.length} articles</span>
      </div>
      <div class="articles-grid">${renderCards(nyt)}</div>
    </div>

    <div id="tab-vogue" class="tab-content">
      <div class="section-header">
        <span class="source-badge vogue">Vogue</span>
        <h2 class="section-title">Fashion Forward</h2>
        <span class="section-count">${vogue.length} articles</span>
      </div>
      <div class="articles-grid">${renderCards(vogue)}</div>
    </div>

    <div id="tab-all" class="tab-content">
      <div class="section-header">
        <h2 class="section-title">All Articles</h2>
        <span class="section-count">${articles.length} total</span>
      </div>
      <div class="articles-grid">${renderCards(articles)}</div>
    </div>
  `;

  document.getElementById('footer-count').textContent =
    `${articles.length} articles · ${images.length} trend images`;

  const titles = articles.slice(0, 12).map(a => a.title).join('   ✦   ');
  document.getElementById('ticker-text').textContent = titles + '   ✦   ' + titles;
}

Promise.all([
  fetch(CSV_URL).then(r => { if (!r.ok) throw new Error('CSV not found'); return r.text(); }),
  fetch(IMAGES_URL).then(r => { if (!r.ok) return '[]'; return r.text(); }).catch(() => '[]')
])
.then(([csvText, jsonText]) => {
  const articles = parseCSV(csvText);
  const images   = JSON.parse(jsonText);
  if (!articles.length) throw new Error('No articles found');
  renderDashboard(articles, images);
})
.catch(() => {
  document.getElementById('main-content').innerHTML = `
    <div class="error-box">
      <strong>Cannot load data</strong>
      Run these commands in your terminal (inside fashion-intel folder):<br><br>
      <code style="background:#f0e8e8;padding:6px 10px;display:inline-block;margin:4px 0;">python main.py</code><br>
      <code style="background:#f0e8e8;padding:6px 10px;display:inline-block;margin:4px 0;">python -m http.server 8000 --bind 127.0.0.1</code><br><br>
      Then refresh this page.
    </div>`;
});
</script>
</body>
</html>
